services:
  - type: web
    name: taskflow-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: taskflow-db, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-luna
      - key: NODE_ENV
        value: production
databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow
    plan: free
